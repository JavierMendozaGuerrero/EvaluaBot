<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Trayectoria</title>
<style>
  :root { color-scheme: light; --ink: #101010; --muted: #5e5e5e; --line: #d8d8d8; --paper: #ffffff; --soft: #f4f4f1; --accent: #101010; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Arial, Helvetica, sans-serif; color: var(--ink); background: var(--paper); }
  .page { min-height: 100vh; padding: 28px clamp(18px, 4vw, 56px) 56px; }
  .nav { display: flex; align-items: center; justify-content: space-between; gap: 24px; padding-bottom: 28px; border-bottom: 1px solid var(--line); }
  .brand { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; text-decoration: none; color: var(--ink); }
  .nav-links { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .nav-links a { color: var(--ink); text-decoration: none; font-size: 14px; }
  .hero { display: grid; grid-template-columns: minmax(0, 1.08fr) minmax(280px, .92fr); gap: clamp(28px, 6vw, 86px); padding-top: clamp(42px, 8vw, 96px); align-items: start; }
  h1 { margin: 0; font-size: clamp(46px, 9vw, 112px); line-height: .92; letter-spacing: -0.055em; font-weight: 800; }
  h2 { margin: 0 0 18px; font-size: clamp(28px, 4vw, 52px); line-height: 1; letter-spacing: -0.035em; }
  p { color: var(--muted); line-height: 1.55; }
  .kicker { color: var(--ink); font-weight: 700; font-size: 14px; margin-bottom: 18px; }
  .panel { border-top: 1px solid var(--ink); padding-top: 22px; }
  label { display: block; margin: 18px 0 7px; font-size: 13px; color: var(--ink); font-weight: 700; }
  input, select { width: 100%; padding: 13px 0; border: 0; border-bottom: 1px solid var(--line); border-radius: 0; font-size: 16px; background: transparent; color: var(--ink); outline: none; }
  input:focus, select:focus { border-bottom-color: var(--ink); }
  button, .button { display: inline-flex; justify-content: center; align-items: center; gap: 10px; min-height: 48px; padding: 13px 18px; border: 1px solid var(--ink); background: var(--ink); color: white; text-decoration: none; border-radius: 0; cursor: pointer; font-weight: 800; font-size: 14px; }
  button.secondary, .button.secondary { background: white; color: var(--ink); }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 26px; }
  .fine { font-size: 13px; color: var(--muted); }
  .error { color: #9f1239; }
  .card-line { border-top: 1px solid var(--line); padding: 18px 0; }
  @media (max-width: 820px) { .hero { grid-template-columns: 1fr; } .nav { align-items: flex-start; flex-direction: column; } }

.stage{padding-top:40px}
.slide{display:grid;grid-template-columns:.85fr 1.15fr;gap:22px}
.side,.main-card{border-top:1px solid var(--ink);padding:24px}
.side{background:var(--soft)}
.main-card{background:var(--ink);color:white}
.main-card p{color:rgba(255,255,255,.78)}
.score{font-size:clamp(100px,20vw,220px);font-weight:1000;line-height:.8;letter-spacing:-.06em}
.quote-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:28px}
.quote{border-top:1px solid rgba(255,255,255,.45);padding-top:14px}
.quote h2{color:white}
.pill{border:1px solid var(--line);background:white;padding:11px 12px;cursor:pointer;text-align:left;margin-bottom:8px;width:100%}
.pill.activo{background:var(--ink);color:white}
.nav-mini{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;margin-top:20px;align-items:center}
.nav-mini button{width:100%}
@media(max-width:820px){.slide{grid-template-columns:1fr}.quote-grid{grid-template-columns:1fr}}
</style>
</head><body><div id="root"></div><script>
const evaluaciones = [{"nombre": "U0BAPCFS2JV", "evaluado": "Irene", "persona_evaluada": "Irene", "persona_que_evalua": "U0BAPCFS2JV", "proyecto": "2", "satisfaccion": "2", "mejor_aspecto": "aaaaaaaaaa", "peor_aspecto": "tremedno", "fecha": "2026-06-16T16:13:00.000+00:00"}, {"nombre": "U0BAPCFS2JV", "evaluado": "Irene", "persona_evaluada": "Irene", "persona_que_evalua": "U0BAPCFS2JV", "proyecto": "STI middleOffice", "satisfaccion": "5", "mejor_aspecto": "5", "peor_aspecto": "34344", "fecha": "2026-06-16T15:11:00.000+00:00"}, {"nombre": "U0BAPCFS2JV", "evaluado": "Irene", "persona_evaluada": "Irene", "persona_que_evalua": "U0BAPCFS2JV", "proyecto": "STI middleOffice", "satisfaccion": "5", "mejor_aspecto": "todo", "peor_aspecto": "nada", "fecha": "2026-06-16T13:56:00.000+00:00"}, {"nombre": "U0BAPCFS2JV", "evaluado": "Irene", "persona_evaluada": "Irene", "persona_que_evalua": "U0BAPCFS2JV", "proyecto": "STI middleOffice", "satisfaccion": "4", "mejor_aspecto": "todo", "peor_aspecto": "nada", "fecha": "2026-06-16T13:22:00.000+00:00"}, {"nombre": "U0BAPCFS2JV", "evaluado": "Irene", "persona_evaluada": "Irene", "persona_que_evalua": "U0BAPCFS2JV", "proyecto": "STI middleOffice", "satisfaccion": "5", "mejor_aspecto": "todo", "peor_aspecto": "nada", "fecha": "2026-06-16T11:22:00.000+00:00"}, {"nombre": "U0BAPCFS2JV", "evaluado": "Irene", "persona_evaluada": "Irene", "persona_que_evalua": "U0BAPCFS2JV", "proyecto": "", "satisfaccion": "4", "mejor_aspecto": "prueba2", "peor_aspecto": "prueba2", "fecha": "2026-06-16T10:12:00.000+00:00"}, {"nombre": "U0BAPCFS2JV", "evaluado": "Irene", "persona_evaluada": "Irene", "persona_que_evalua": "U0BAPCFS2JV", "proyecto": "", "satisfaccion": "5", "mejor_aspecto": "5", "peor_aspecto": "tofo", "fecha": "2026-06-16T09:57:00.000+00:00"}];
const agrupadas = new Map();
for (const ev of evaluaciones) {
  const persona = ev.evaluado || "General";
  if (!agrupadas.has(persona)) agrupadas.set(persona, []);
  agrupadas.get(persona).push(ev);
}
for (const lista of agrupadas.values()) {
  lista.sort((a, b) => String(a.fecha || "").localeCompare(String(b.fecha || "")));
}

const personas = Array.from(agrupadas.keys()).sort();
let persona = personas[0] || "";
let indice = 0;

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[char]));
}

function fecha(value) {
  return value ? String(value).slice(0, 10) : "Sin fecha";
}

function render() {
  const lista = agrupadas.get(persona) || [];
  const actual = lista[indice];
  const botones = personas.map((nombre) => `
    <button class="pill ${nombre === persona ? "activo" : ""}" data-persona="${escapeHtml(nombre)}">${escapeHtml(nombre)}</button>
  `).join("");

  document.getElementById("root").innerHTML = `
    <main class="page">
      <nav class="nav">
        <a class="brand" href="/">igeneris</a>
        <a href="/">Volver</a>
      </nav>
      <section class="hero">
        <div>
          <p class="kicker">Trayectoria</p>
          <h1>Tu trayectoria de evaluación.</h1>
        </div>
        <div class="panel">
          <p>Navega por fecha, proyecto y satisfacción.</p>
        </div>
      </section>
      ${actual ? `
        <section class="stage slide">
          <aside class="side">
            <div>${botones}</div>
            <div class="nav-mini">
              <button id="prev" ${indice === 0 ? "disabled" : ""}>Anterior</button>
              <strong>${indice + 1} / ${lista.length}</strong>
              <button id="next" ${indice >= lista.length - 1 ? "disabled" : ""}>Siguiente</button>
            </div>
          </aside>
          <article class="main-card">
            <p>${fecha(actual.fecha)}</p>
            <div class="score">${escapeHtml(actual.satisfaccion || "-")}/5</div>
            <p>Proyecto: ${escapeHtml(actual.proyecto || "Sin proyecto")}</p>
            <div class="quote-grid">
              <div class="quote">
                <h2>Lo mejor</h2>
                <p>${escapeHtml(actual.mejor_aspecto || "Sin respuesta")}</p>
              </div>
              <div class="quote">
                <h2>A mejorar</h2>
                <p>${escapeHtml(actual.peor_aspecto || "Sin respuesta")}</p>
              </div>
            </div>
          </article>
        </section>
      ` : `<section class="panel"><p>No hay evaluaciones todavía.</p></section>`}
    </main>
  `;

  for (const button of document.querySelectorAll("[data-persona]")) {
    button.addEventListener("click", () => {
      persona = button.dataset.persona;
      indice = 0;
      render();
    });
  }
  document.getElementById("prev")?.addEventListener("click", () => {
    indice = Math.max(0, indice - 1);
    render();
  });
  document.getElementById("next")?.addEventListener("click", () => {
    indice = Math.min(lista.length - 1, indice + 1);
    render();
  });
}

render();
</script></body></html>
